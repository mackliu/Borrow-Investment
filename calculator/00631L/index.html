<script>
Forcast.DataLoader.setBasePath('../../');

var CONFIG = {
  loan: { amount: 1500000, annualRate: 0.0423, periods: 84 },
  trading: { buyCommission: 0.001425, sellCommission: 0.001425, sellTax: 0.001 },
  buyDate: "2024-04-16",
  sellDayOfMonth: 13,
  dividendStrategy: "mixed",
  projectionRate: null,
  futureDivPerShare: 0,
  futureDivMonths: []
};

var PAGE_CONFIG = {
  ticker: '00631L',
  name: '元大台灣50正2',
  loan: CONFIG.loan,
  buyDate: CONFIG.buyDate,
  corporateActions: [],
  hasDividends: false,
  notes: [
    '00631L 為槓桿型 ETF，不配發股利',
    '槓桿 ETF 存在波動衰減（volatility decay）風險，長期持有可能偏離指數報酬'
  ],
  warnings: [
    '⚠ 高風險警告：槓桿 ETF + 信用貸款 = 雙重槓桿，波動幅度極大',
    '⚠ 槓桿型 ETF 不適合長期持有，借貸投資槓桿 ETF 的風險極高，可能導致嚴重虧損'
  ]
};

async function init() {
  try {
    var prices = await Forcast.DataLoader.loadPrices('00631L');
    var dividends = await Forcast.DataLoader.loadDividends('00631L');
    var actions = await Forcast.DataLoader.loadCorporateActions('00631L');
    PAGE_CONFIG.corporateActions = actions;
    var sim = Forcast.BacktestEngine.simulate(CONFIG, prices, dividends, actions);
    Forcast.CalculatorRenderer.render(sim, PAGE_CONFIG);
  } catch (e) {
    console.error('初始化失敗:', e);
  }
}
init();
</script>
