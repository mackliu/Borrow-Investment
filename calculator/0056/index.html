<h1>信貸買 0056 回測試算</h1>

<div class="params" id="params"></div>

    <thead id="thead"></thead>

<div id="divSection">
  <div class="section-title">股利事件明細</div>
  <div class="table-wrap">
    <table>
      <thead><tr><th>除息日</th><th>發放日</th><th>每股股利</th><th>持股數</th><th>股利總額</th><th>處理方式</th><th>買入股數</th><th>買入價格</th></tr></thead>

<div class="footer">資料來源：台灣證券交易所 (TWSE) ｜ 未來月份以歷史報酬率推算，僅供參考</div>

<script src="../../assets/js/backtest-engine.js"></script>

<script>
Forcast.DataLoader.setBasePath('../../');

var CONFIG = {
  loan: { amount: 1500000, annualRate: 0.0423, periods: 84 },
  trading: { buyCommission: 0.001425, sellCommission: 0.001425, sellTax: 0.001 },
  buyDate: "2024-04-16",
  sellDayOfMonth: 13,
  dividendStrategy: "mixed",
  projectionRate: null,
  futureDivPerShare: 0.87,
  futureDivMonths: [1, 4, 7, 10]
};

var PAGE_CONFIG = {
  ticker: '0056',
  name: '元大高股息',
  loan: CONFIG.loan,
  buyDate: CONFIG.buyDate,
  corporateActions: [],
  hasDividends: true,
  notes: [
    '0056 於 2023 年從年配改為季配息',
    '高股息 ETF 的配息可能覆蓋部分月還款，降低每月賣股壓力'
  ],
  warnings: []
};

async function init() {
  try {
    var prices = await Forcast.DataLoader.loadPrices('0056');
    var dividends = await Forcast.DataLoader.loadDividends('0056');
    var actions = await Forcast.DataLoader.loadCorporateActions('0056');
    PAGE_CONFIG.corporateActions = actions;
    var sim = Forcast.BacktestEngine.simulate(CONFIG, prices, dividends, actions);
    Forcast.CalculatorRenderer.render(sim, PAGE_CONFIG);
  } catch (e) {
    console.error('初始化失敗:', e);
  }
}
init();
</script>
