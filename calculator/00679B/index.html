<script>
Forcast.DataLoader.setBasePath('../../');

var CONFIG = {
  loan: { amount: 1500000, annualRate: 0.0423, periods: 84 },
  trading: { buyCommission: 0.001425, sellCommission: 0.001425, sellTax: 0.001 },
  buyDate: "2024-04-16",
  sellDayOfMonth: 13,
  dividendStrategy: "mixed",
  projectionRate: null,
  futureDivPerShare: 0.20,
  futureDivMonths: [2, 5, 8, 11]
};

var PAGE_CONFIG = {
  ticker: '00679B',
  name: '元大美債20年',
  loan: CONFIG.loan,
  buyDate: CONFIG.buyDate,
  corporateActions: [],
  hasDividends: true,
  notes: [
    '00679B 為美國長天期公債 ETF，價格與美國利率呈反向關係',
    '配息來自債券票息，以台幣計價存在匯率風險',
    '00679B 股利發放日（payDate）資料不完整，已自動以除息日+30天估算'
  ],
  warnings: [
    '⚠ 注意：債券 ETF 在升息環境中價格下跌，借貸利率可能高於債券殖利率，導致負利差'
  ]
};

async function init() {
  try {
    var prices = await Forcast.DataLoader.loadPrices('00679B');
    var dividends = await Forcast.DataLoader.loadDividends('00679B');
    var actions = await Forcast.DataLoader.loadCorporateActions('00679B');
    PAGE_CONFIG.corporateActions = actions;
    var sim = Forcast.BacktestEngine.simulate(CONFIG, prices, dividends, actions);
    Forcast.CalculatorRenderer.render(sim, PAGE_CONFIG);
  } catch (e) {
    console.error('初始化失敗:', e);
  }
}
init();
</script>
