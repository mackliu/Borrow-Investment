  var shares = Math.floor(LOAN / buyCostPerShare);
  var cash = LOAN - shares * buyCostPerShare;
  var initialShares = shares;
  var initialBuyComm = shares * buyPrice * BUY_COMM;

  var remainingLoan = LOAN;
  var splitApplied = false;
  var totalInterest = 0;
  var totalSellCost = 0;
  var totalDividends = 0;
  var totalBuyComm = initialBuyComm;
  var lastPayDate = BUY_DATE;
  var results = [];
  var divResults = [];
  var processedDivs = {};

  for (var i = 1; i <= PERIODS; i++) {
    var targetPayDate = addMonths(BUY_DATE, i);
    var payMonth = new Date(targetPayDate);
    var targetSellDate = dateStr(payMonth.getFullYear(), payMonth.getMonth() + 1, 13);
    var sellInfo = findTradingDayOnOrAfter(targetSellDate);
    var payInfo = findTradingDayOnOrAfter(targetPayDate);
    var sellDate = sellInfo.date;
    var payDate = payInfo.date;
    if (sellDate > payDate) sellDate = payDate;

    if (!splitApplied && sellDate >= SPLIT_DATE) {
      shares *= SPLIT_RATIO;
      splitApplied = true;
    }

    var events = [];
    for (var di = 0; di < DIVIDENDS.length; di++) {
      var div = DIVIDENDS[di];
      if (processedDivs[div.exDate]) continue;
      if (div.exDate > lastPayDate && div.exDate <= payDate) {
        var divShares = shares;
        var divAmount = divShares * div.amount;
        totalDividends += divAmount;
        var daysToPayment = Math.abs((new Date(payDate) - new Date(div.payDate)) / (1000*60*60*24));
        var action, boughtShares = 0, buyPriceDiv = 0;
        if (div.payDate === payDate || daysToPayment <= 1) {
          cash += divAmount;
          action = "用於還款";
        } else {
          var buyDateInfo = findTradingDayOnOrAfter(div.payDate);
          var pInfo = getPrice(buyDateInfo.date);
          buyPriceDiv = pInfo.price;
          var buyCost = buyPriceDiv * (1 + BUY_COMM);
          boughtShares = Math.floor(divAmount / buyCost);
          var spentOnBuy = boughtShares * buyCost;
          var buyCommission = boughtShares * buyPriceDiv * BUY_COMM;
          totalBuyComm += buyCommission;
          shares += boughtShares;
          cash += (divAmount - spentOnBuy);
          action = "再投入買股";
        }
        processedDivs[div.exDate] = true;
        events.push({ type: 'div', exDate: div.exDate });
        divResults.push({ exDate: div.exDate, payDate: div.payDate, amount: div.amount, shares: divShares, total: divAmount, action: action, boughtShares: boughtShares, buyPrice: buyPriceDiv });
      }
    }

    if (payDate > "2026-07-01") {
      var payYear = parseInt(payDate.substring(0, 4));
      var payMonthNum = parseInt(payDate.substring(5, 7));
      var divMonths = [1, 7];
      for (var dm = 0; dm < divMonths.length; dm++) {
        var divMonth = divMonths[dm];
        var futDivExDate = dateStr(payYear, divMonth, 20);
        if (!processedDivs[futDivExDate] && futDivExDate > lastPayDate && futDivExDate <= payDate) {
          var futDivAmount = shares * FUTURE_DIV_PER_SHARE;
          totalDividends += futDivAmount;
          var futBuyDateInfo = findTradingDayOnOrAfter(dateStr(payYear, divMonth === 1 ? 2 : 8, 10));
          var futPInfo = getPrice(futBuyDateInfo.date);
          var futBuyCost = futPInfo.price * (1 + BUY_COMM);
          var futBoughtShares = Math.floor(futDivAmount / futBuyCost);
          totalBuyComm += futBoughtShares * futPInfo.price * BUY_COMM;
          shares += futBoughtShares;
          cash += (futDivAmount - futBoughtShares * futBuyCost);
          processedDivs[futDivExDate] = true;
          events.push({ type: 'div', exDate: futDivExDate });
          divResults.push({ exDate: futDivExDate, payDate: futBuyDateInfo.date, amount: FUTURE_DIV_PER_SHARE, shares: shares - futBoughtShares, total: futDivAmount, action: "再投入買股(推估)", boughtShares: futBoughtShares, buyPrice: futPInfo.price });
        }
      }
    }

    var interest = remainingLoan * MONTHLY_RATE;
    var principal = PMT - interest;
    totalInterest += interest;
    var sellPriceInfo = getPrice(sellDate);
    var sellPrice = sellPriceInfo.price;
    var isProjected = sellPriceInfo.projected;
    var netPerShare = sellPrice * (1 - SELL_COMM - SELL_TAX);
    var amountNeeded = PMT - cash;
    var sharesToSell = 0;
    if (amountNeeded > 0) {
      sharesToSell = Math.ceil(amountNeeded / netPerShare);
      if (sharesToSell > shares) sharesToSell = shares;
    }
    var sellProceeds = sharesToSell * sellPrice;
    var sellCostVal = sellProceeds * (SELL_COMM + SELL_TAX);
    var netProceeds = sellProceeds - sellCostVal;
    totalSellCost += sellCostVal;
    shares -= sharesToSell;
    cash += netProceeds;
    cash -= PMT;
    remainingLoan -= principal;
    if (remainingLoan < 0.01) remainingLoan = 0;
    var payPriceInfo = getPrice(payDate);
    var payPriceVal = payPriceInfo.price;
    var marketValue = shares * payPriceVal;
    var netPosition = marketValue + cash - remainingLoan;

    var hasSplit = (splitApplied && results.length > 0 && !results[results.length-1].splitApplied);
    if (hasSplit) events.push({ type: 'split' });

    results.push({
      period: i, payDate: payDate, sellDate: sellDate,
      sellPrice: sellPrice, sharesToSell: sharesToSell, sellCost: sellCostVal, netProceeds: netProceeds,
      payment: PMT, principal: principal, interest: interest,
      remainingLoan: remainingLoan, cash: cash, shares: shares,
      payPrice: payPriceVal, marketValue: marketValue, netPosition: netPosition,
      isProjected: isProjected, events: events, splitApplied: splitApplied
    });
    lastPayDate = payDate;
  }

  return {
    results: results, divResults: divResults,
    initialShares: initialShares, initialBuyComm: initialBuyComm, buyPrice: buyPrice,
    totalInterest: totalInterest, totalSellCost: totalSellCost, totalBuyComm: totalBuyComm,
    totalDividends: totalDividends, monthlyPayment: PMT,
    monthlyGrowthRate: monthlyGrowth || calcMonthlyGrowthRate()
  };
}

    "2026-02-05": 72.00, "2026-02-06": 71.90, "2026-02-09": 73.95,
    "2026-02-10": 75.50, "2026-02-11": 77.20, "2026-02-23": 77.40,
    "2026-02-24": 79.40, "2026-02-25": 81.10, "2026-02-26": 81.15,
    "2026-03-02": 80.35, "2026-03-03": 78.75, "2026-03-04": 75.60,
    "2026-03-05": 77.40, "2026-03-06": 76.85, "2026-03-09": 73.60,
    "2026-03-10": 75.20, "2026-03-11": 78.20, "2026-03-12": 76.60,
    "2026-03-13": 75.95, "2026-03-16": 75.60, "2026-03-17": 76.65,
    "2026-03-18": 77.80, "2026-03-19": 76.00
  };

  var dividends = [
    { exDate: "2024-07-16", payDate: "2024-08-09", amount: 1.00 },
    { exDate: "2025-01-17", payDate: "2025-02-20", amount: 2.70 },
    { exDate: "2025-07-21", payDate: "2025-08-08", amount: 0.36 },
    { exDate: "2026-01-22", payDate: "2026-02-11", amount: 1.00 }
  ];

  var actions = [
    { date: "2025-06-18", type: "split", ratio: 4 }
  ];

  var newSim = Forcast.BacktestEngine.simulate(config, prices, dividends, actions);
  log('新引擎模擬完成: ' + newSim.periods.length + ' 期');

  // ===== 比對 =====
  section('摘要比對');
  assertEqual('initialShares', newSim.summary.initialShares, original.initialShares);
  assertEqual('buyPrice', newSim.summary.buyPrice, original.buyPrice, 0.001);
  assertEqual('monthlyPayment', newSim.summary.monthlyPayment, original.monthlyPayment, 0.01);
  assertEqual('initialBuyComm', newSim.summary.initialBuyComm, original.initialBuyComm, 0.01);
  assertEqual('totalInterest', newSim.summary.totalInterest, original.totalInterest, 0.01);
  assertEqual('totalSellCost', newSim.summary.totalSellCost, original.totalSellCost, 0.01);
  assertEqual('totalBuyComm', newSim.summary.totalBuyComm, original.totalBuyComm, 0.01);
  assertEqual('totalDividends', newSim.summary.totalDividends, original.totalDividends, 0.01);
  assertEqual('monthlyGrowthRate', newSim.summary.monthlyGrowthRate, original.monthlyGrowthRate, 0.000001);

  section('逐期比對（全 84 期）');
  for (var i = 0; i < 84; i++) {
    var o = original.results[i];
    var n = newSim.periods[i];
    var prefix = '期 ' + (i+1);

    assertEqual(prefix + ' payDate', n.payDate === o.payDate ? 1 : 0, 1);
    assertEqual(prefix + ' sellDate', n.sellDate === o.sellDate ? 1 : 0, 1);
    assertEqual(prefix + ' sellPrice', n.sellPrice, o.sellPrice, 0.01);
    assertEqual(prefix + ' sharesToSell', n.sharesToSell, o.sharesToSell);
    assertEqual(prefix + ' shares', n.shares, o.shares);
    assertEqual(prefix + ' cash', n.cash, o.cash, 0.01);
    assertEqual(prefix + ' remainingLoan', n.remainingLoan, o.remainingLoan, 0.01);
    assertEqual(prefix + ' marketValue', n.marketValue, o.marketValue, 0.1);
    assertEqual(prefix + ' netPosition', n.netPosition, o.netPosition, 0.1);
  }

  section('股利事件比對');
  assertEqual('divResults length', newSim.dividendEvents.length, original.divResults.length);
  for (var j = 0; j < original.divResults.length; j++) {
    var od = original.divResults[j];
    var nd = newSim.dividendEvents[j];
    if (!nd) { log('  FAIL 股利事件 ' + j + ' 缺失', 'fail'); failed++; continue; }
    var dp = '股利 ' + od.exDate;
    assertEqual(dp + ' exDate', nd.exDate === od.exDate ? 1 : 0, 1);
    assertEqual(dp + ' amount', nd.amount, od.amount, 0.001);
    assertEqual(dp + ' shares', nd.shares, od.shares);
    assertEqual(dp + ' total', nd.total, od.total, 0.01);
    assertEqual(dp + ' boughtShares', nd.boughtShares, od.boughtShares);
  }

  // ===== 總結 =====
  section('測試總結');
  log('總計: ' + totalTests + ' 測試, ' + passed + ' 通過, ' + failed + ' 失敗',
      failed === 0 ? 'pass' : 'fail');
  document.title = (failed === 0 ? 'PASS' : 'FAIL') + ' - 回歸測試';
}

runTests();
