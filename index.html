  { exDate: "2025-01-17", payDate: "2025-02-20", amount: 2.70, preSplit: true },
  { exDate: "2025-07-21", payDate: "2025-08-08", amount: 0.36, preSplit: false },
  { exDate: "2026-01-22", payDate: "2026-02-11", amount: 1.00, preSplit: false },
];

// 未來預估股利 (拆後每股, 每年兩次: 1月和7月除息)
const FUTURE_DIV_PER_SHARE = 0.55;

// ===== 工具函數 =====
const tradingDays = Object.keys(PRICES).sort();
const lastActualTD = tradingDays[tradingDays.length - 1];

function dateStr(y, m, d) {
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function addMonths(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00');
  d.setMonth(d.getMonth() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function findTradingDayOnOrAfter(target) {
  // 在實際資料中找
  for (const td of tradingDays) {
    if (td >= target) return { date: td, projected: false };
  }
  // 超出實際資料，回傳目標日期本身（跳過週末）
  let d = new Date(target + 'T00:00:00');
  while (d.getDay() === 0 || d.getDay() === 6) {
    d.setDate(d.getDate() + 1);
  }
  const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  return { date: ds, projected: true };
}

// 計算月報酬率（用於推估未來價格）
function calcMonthlyGrowthRate() {
  // 從 2024-04-16 到最後可用資料的總報酬
  const buyPrice = PRICES[BUY_DATE]; // 155.65 (拆前)
  const lastPrice = PRICES[lastActualTD]; // 76.00 (拆後)
  const lastPriceEquiv = lastPrice * SPLIT_RATIO; // 等效拆前價格 = 304.00

  // 計算已收股利（以拆前每股為基準）
  // 拆前股利: 1.00 + 2.70 = 3.70
  // 拆後股利: (0.36 + 1.00) * 4 = 5.44 等效
  // 注意：除息後股價會下跌，所以股利不重複算在價格裡
  // 但因為我們用的是實際價格（已包含除息跌價），股利是額外收入
  const totalDivPerOrigShare = 1.00 + 2.70 + (0.36 + 1.00) * SPLIT_RATIO;

  // 計算月份數
  const startD = new Date(BUY_DATE);
  const endD = new Date(lastActualTD);
  const months = (endD.getFullYear() - startD.getFullYear()) * 12 + (endD.getMonth() - startD.getMonth());

  // 總報酬率
  const totalReturn = (lastPriceEquiv + totalDivPerOrigShare) / buyPrice;
  // 月化報酬率
  const monthlyRate = Math.pow(totalReturn, 1 / months) - 1;
  return monthlyRate;
}

// 取得價格（實際或推估）
let projectedPrices = {};
let monthlyGrowth = null;

function getPrice(dateStr) {
  if (PRICES[dateStr] !== undefined) return { price: PRICES[dateStr], projected: false };
  if (projectedPrices[dateStr] !== undefined) return { price: projectedPrices[dateStr], projected: true };

  if (!monthlyGrowth) monthlyGrowth = calcMonthlyGrowthRate();

  // 找最近的已知價格
  const allDates = [...tradingDays, ...Object.keys(projectedPrices)].sort();
  let lastKnown = null, lastKnownPrice = null;
  for (const d of allDates) {
    if (d <= dateStr) {
      lastKnown = d;
      lastKnownPrice = PRICES[d] || projectedPrices[d];
    }
  }

  if (!lastKnown) return { price: PRICES[lastActualTD], projected: true };

  // 計算天數差
  const d1 = new Date(lastKnown);
  const d2 = new Date(dateStr);
  const daysDiff = (d2 - d1) / (1000 * 60 * 60 * 24);
  const dailyRate = Math.pow(1 + monthlyGrowth, 1/30) - 1;
  const projPrice = Math.round(lastKnownPrice * Math.pow(1 + dailyRate, daysDiff) * 100) / 100;
  projectedPrices[dateStr] = projPrice;
  return { price: projPrice, projected: true };
}

// ===== 月付金額計算 =====
const PMT = LOAN * MONTHLY_RATE * Math.pow(1 + MONTHLY_RATE, PERIODS) / (Math.pow(1 + MONTHLY_RATE, PERIODS) - 1);

// ===== 主模擬 =====
function simulate() {
  const buyPrice = PRICES[BUY_DATE];
  const buyCostPerShare = buyPrice * (1 + BUY_COMM);
  let shares = Math.floor(LOAN / buyCostPerShare);
  let cash = LOAN - shares * buyCostPerShare;
  const initialShares = shares;
  const initialBuyComm = shares * buyPrice * BUY_COMM;

  let remainingLoan = LOAN;
  let splitApplied = false;
  let totalInterest = 0;
  let totalSellCost = 0;
  let totalDividends = 0;
  let totalBuyComm = initialBuyComm;
  let lastPayDate = BUY_DATE;
  const results = [];
  const divResults = [];

  // 追蹤除息前持股數（用於計算股利）
  let processedDivs = new Set();

  for (let i = 1; i <= PERIODS; i++) {
    // 計算目標日期
    const targetPayDate = addMonths(BUY_DATE, i);
    const payMonth = new Date(targetPayDate);
    const targetSellDate = dateStr(payMonth.getFullYear(), payMonth.getMonth() + 1, 13);

    // 找實際交易日
    const sellInfo = findTradingDayOnOrAfter(targetSellDate);
    const payInfo = findTradingDayOnOrAfter(targetPayDate);
    let sellDate = sellInfo.date;
    let payDate = payInfo.date;

    // 確保賣股日在還款日之前或同一天
    if (sellDate > payDate) sellDate = payDate;

    // 檢查分割（在賣股前）
    if (!splitApplied && sellDate >= SPLIT_DATE) {
      shares *= SPLIT_RATIO;
      splitApplied = true;
    }

    // 處理股利事件（在上次還款日和本次還款日之間）
    let events = [];
    for (const div of DIVIDENDS) {
      if (processedDivs.has(div.exDate)) continue;
      if (div.exDate > lastPayDate && div.exDate <= payDate) {
        // 除息日在這個區間，計算股利
        const divShares = shares; // 除息日前持股
        const divAmount = divShares * div.amount;
        totalDividends += divAmount;

        // 判斷是否直接還款或再投入
        const daysToPayment = Math.abs((new Date(payDate) - new Date(div.payDate)) / (1000*60*60*24));
        const payDateObj = new Date(payDate);
        const divPayObj = new Date(div.payDate);

        let action, boughtShares = 0, buyPriceDiv = 0;
        if (div.payDate === payDate || daysToPayment <= 1) {
          // 用來還款
          cash += divAmount;
          action = "用於還款";
        } else {
          // 再投入買股
          const buyDateInfo = findTradingDayOnOrAfter(div.payDate);
          const pInfo = getPrice(buyDateInfo.date);
          buyPriceDiv = pInfo.price;
          const buyCost = buyPriceDiv * (1 + BUY_COMM);
          boughtShares = Math.floor(divAmount / buyCost);
          const spentOnBuy = boughtShares * buyCost;
          const buyCommission = boughtShares * buyPriceDiv * BUY_COMM;
          totalBuyComm += buyCommission;
          shares += boughtShares;
          cash += (divAmount - spentOnBuy); // 剩餘零頭加入現金
          action = "再投入買股";
        }
        processedDivs.add(div.exDate);
        events.push({ type: 'div', exDate: div.exDate });
        divResults.push({
          exDate: div.exDate, payDate: div.payDate,
          amount: div.amount, shares: divShares, total: divAmount,
          action, boughtShares, buyPrice: buyPriceDiv
        });
      }
    }

    // 未來股利推估（超出已知股利資料後）
    if (payDate > "2026-07-01") {
      const payYear = parseInt(payDate.substring(0, 4));
      const payMonthNum = parseInt(payDate.substring(5, 7));
      // 每年 1月和 7月除息
      for (const divMonth of [1, 7]) {
        const futDivExDate = dateStr(payYear, divMonth, 20);
        if (!processedDivs.has(futDivExDate) && futDivExDate > lastPayDate && futDivExDate <= payDate) {
          const divAmount = shares * FUTURE_DIV_PER_SHARE;
          totalDividends += divAmount;
          // 再投入
          const buyDateInfo = findTradingDayOnOrAfter(dateStr(payYear, divMonth === 1 ? 2 : 8, 10));
          const pInfo = getPrice(buyDateInfo.date);
          const buyCost = pInfo.price * (1 + BUY_COMM);
          const boughtShares = Math.floor(divAmount / buyCost);
          totalBuyComm += boughtShares * pInfo.price * BUY_COMM;
          shares += boughtShares;
          cash += (divAmount - boughtShares * buyCost);
          processedDivs.add(futDivExDate);
          events.push({ type: 'div', exDate: futDivExDate });
          divResults.push({
            exDate: futDivExDate, payDate: buyDateInfo.date,
            amount: FUTURE_DIV_PER_SHARE, shares: shares - boughtShares, total: divAmount,
            action: "再投入買股(推估)", boughtShares, buyPrice: pInfo.price
          });
        }
      }
    }

    // 貸款攤還計算
    const interest = remainingLoan * MONTHLY_RATE;
    const principal = PMT - interest;
    totalInterest += interest;

    // 取得賣出價格
    const sellPriceInfo = getPrice(sellDate);
    const sellPrice = sellPriceInfo.price;
    const isProjected = sellPriceInfo.projected;

    // 計算需賣出股數
    const netPerShare = sellPrice * (1 - SELL_COMM - SELL_TAX);
    const amountNeeded = PMT - cash;
    let sharesToSell = 0;
    if (amountNeeded > 0) {
      sharesToSell = Math.ceil(amountNeeded / netPerShare);
      if (sharesToSell > shares) sharesToSell = shares;
    }

    // 執行賣出
    const sellProceeds = sharesToSell * sellPrice;
    const sellCost = sellProceeds * (SELL_COMM + SELL_TAX);
    const netProceeds = sellProceeds - sellCost;
    totalSellCost += sellCost;
    shares -= sharesToSell;
    cash += netProceeds;

    // 還款
    cash -= PMT;
    remainingLoan -= principal;
    if (remainingLoan < 0.01) remainingLoan = 0;

    // 還款日股價和市值
    const payPriceInfo = getPrice(payDate);
    const payPrice = payPriceInfo.price;
    const marketValue = shares * payPrice;
    const netPosition = marketValue + cash - remainingLoan;

    // 判斷分割事件
    if (events.length === 0 && !splitApplied && i > 1) { /* no event */ }
    const hasSplit = (splitApplied && results.length > 0 && !results[results.length-1].splitApplied);
    if (hasSplit) events.push({ type: 'split' });

    results.push({
      period: i,
      payDate, sellDate,
      sellPrice, sharesToSell, sellCost, netProceeds,
      payment: PMT, principal, interest,
      remainingLoan, cash, shares,
      payPrice, marketValue, netPosition,
      isProjected, events,
      splitApplied
    });
    lastPayDate = payDate;
  }

  return {
    results, divResults,
    initialShares, initialBuyComm, buyPrice,
    totalInterest, totalSellCost, totalBuyComm, totalDividends,
    monthlyPayment: PMT
  };
}

// ===== 數字格式化 =====
function fmt(n, dec = 0) {
  return n.toLocaleString('zh-TW', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

// ===== 渲染 =====
function render() {
  const sim = simulate();
  const r = sim.results;
  const last = r[r.length - 1];

  // 總成本
  const totalCosts = sim.totalInterest + sim.totalSellCost + sim.totalBuyComm;
  // 最終資產 = 剩餘股票市值 + 剩餘現金
  const finalAssets = last.marketValue + last.cash;
  // 淨損益 = 最終資產 - 總成本（利息+交易成本）
  const profitLoss = finalAssets - totalCosts;
  const isProfit = profitLoss >= 0;

  // 初始買入資訊
  const splitNote = `(拆後 ${sim.initialShares * SPLIT_RATIO} 股)`;

  // 參數區
  document.getElementById('params').innerHTML = `
    <div class="param-card"><div class="label">貸款金額</div><div class="value">NT$${fmt(LOAN)}</div></div>
    <div class="param-card"><div class="label">年利率</div><div class="value">${(ANNUAL_RATE*100).toFixed(2)}%</div></div>
    <div class="param-card"><div class="label">期數</div><div class="value">${PERIODS} 期</div></div>
    <div class="param-card"><div class="label">每月還款</div><div class="value">NT$${fmt(sim.monthlyPayment, 0)}</div></div>
    <div class="param-card"><div class="label">買入日期</div><div class="value">${BUY_DATE}</div></div>
    <div class="param-card"><div class="label">買入價格</div><div class="value">NT$${fmt(sim.buyPrice, 2)}</div></div>
    <div class="param-card"><div class="label">買入股數</div><div class="value">${fmt(sim.initialShares)} 股 ${splitNote}</div></div>
    <div class="param-card"><div class="label">買入手續費</div><div class="value">NT$${fmt(sim.initialBuyComm, 0)}</div></div>
  `;

  // 判定
  const verdictEl = document.getElementById('verdict');
  verdictEl.className = `verdict ${isProfit ? 'profit' : 'loss'}`;
  verdictEl.innerHTML = isProfit
    ? `策略結果：獲利 NT$${fmt(profitLoss)} (投資報酬率 ${(profitLoss/LOAN*100).toFixed(1)}%)`
    : `策略結果：虧損 NT$${fmt(Math.abs(profitLoss))} (投資報酬率 ${(profitLoss/LOAN*100).toFixed(1)}%)`;

  // 摘要
  document.getElementById('summary').innerHTML = `
    <div class="summary-card"><div class="label">總還款金額</div><div class="value">NT$${fmt(sim.monthlyPayment * PERIODS)}</div></div>
    <div class="summary-card"><div class="label">總利息支出</div><div class="value loss">NT$${fmt(sim.totalInterest)}</div></div>
    <div class="summary-card"><div class="label">總賣出交易成本</div><div class="value loss">NT$${fmt(sim.totalSellCost)}</div></div>
    <div class="summary-card"><div class="label">總買入手續費</div><div class="value loss">NT$${fmt(sim.totalBuyComm)}</div></div>
    <div class="summary-card"><div class="label">總股利收入</div><div class="value profit">NT$${fmt(sim.totalDividends)}</div></div>
    <div class="summary-card"><div class="label">最終剩餘股數</div><div class="value">${fmt(last.shares)} 股</div></div>
    <div class="summary-card"><div class="label">最終股票市值</div><div class="value">NT$${fmt(last.marketValue)}</div></div>
    <div class="summary-card"><div class="label">最終剩餘現金</div><div class="value">NT$${fmt(last.cash)}</div></div>
    <div class="summary-card"><div class="label">總成本(利息+交易)</div><div class="value loss">NT$${fmt(totalCosts)}</div></div>
    <div class="summary-card"><div class="label">最終淨資產</div><div class="value ${isProfit ? 'profit' : 'loss'}">NT$${fmt(finalAssets)}</div></div>
    <div class="summary-card"><div class="label">淨損益</div><div class="value ${isProfit ? 'profit' : 'loss'}">NT$${fmt(profitLoss)}</div></div>
  `;

  // 計算實際資料的最後一期
  let lastActualPeriod = 0;
  for (const row of r) {
    if (!row.isProjected) lastActualPeriod = row.period;
  }

  // 截至實際資料的淨損益
  const laRow = r[lastActualPeriod - 1];
  const laInterest = r.slice(0, lastActualPeriod).reduce((s, x) => s + x.interest, 0);
  const laSellCost = r.slice(0, lastActualPeriod).reduce((s, x) => s + x.sellCost, 0);
  const laActualPL = laRow.marketValue + laRow.cash - laRow.remainingLoan - laInterest - laSellCost - sim.initialBuyComm;

  const growthRate = monthlyGrowth || calcMonthlyGrowthRate();
  const annualRate = (Math.pow(1 + growthRate, 12) - 1) * 100;

  // 備註
  document.getElementById('noteArea').innerHTML = `
    <strong>說明：</strong><br>
    1. 第 1~${lastActualPeriod} 期使用 TWSE 實際交易價格（未調整），第 ${lastActualPeriod + 1}~84 期使用歷史報酬率推估<br>
    2. 0050 於 2025-06-18 進行 1拆4 分割，表中價格為實際交易價格<br>
    3. 賣出成本 = 手續費 0.1425% + 證交稅 0.1%；買入成本 = 手續費 0.1425%<br>
    4. 股利發放日離還款日超過2天，一律再投入購買 0050<br>
    5. 推估月報酬率 = ${(growthRate * 100).toFixed(2)}%（年化 ${annualRate.toFixed(1)}%），基於前 ${lastActualPeriod} 個月實際總報酬<br>
    6. <span style="color:#888;font-style:italic">斜體灰色</span> 列為推估資料<br>
    <br>
    <strong>截至實際資料 (第 ${lastActualPeriod} 期, ${laRow.payDate})：</strong><br>
    剩餘貸款 NT$${fmt(laRow.remainingLoan)} ｜ 持有 ${fmt(laRow.shares)} 股 ｜ 市值 NT$${fmt(laRow.marketValue)} ｜ 淨資產 NT$${fmt(laRow.netPosition)}<br>
    <span style="color:var(--green);font-weight:600">以實際資料計算，目前淨損益 = NT$${fmt(laActualPL)}（含已付利息與交易成本）</span><br>
    <br>
    <strong style="color:var(--red)">注意：</strong>
    推估年化報酬率 ${annualRate.toFixed(1)}% 是基於 2024/04~2026/03 的歷史表現，此期間台股表現異常強勁。
    長期年化報酬率通常在 8~12% 左右。以 10% 年化報酬率推估，最終結果會保守許多。
    此試算僅供參考，不構成投資建議。
  `;

  // 表頭
  document.getElementById('thead').innerHTML = `<tr>
    <th>期數</th><th>還款日</th><th>賣股日</th><th>賣出價</th><th>賣出股數</th>
    <th>交易成本</th><th>月付金額</th><th>本金</th><th>利息</th>
    <th>剩餘貸款</th><th>留存現金</th><th>持有股數</th>
    <th>還款日股價</th><th>股票市值</th><th>淨資產</th>
  </tr>`;

  // 表格內容
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  for (const row of r) {
    const tr = document.createElement('tr');
    if (row.isProjected) tr.className = 'projected';

    let eventTags = '';
    for (const ev of row.events) {
      if (ev.type === 'split') eventTags += '<span class="event-tag split">1:4 分割</span>';
      if (ev.type === 'div') eventTags += '<span class="event-tag div">配息</span>';
    }
    if (row.isProjected && row.period === r.find(x => x.isProjected)?.period) {
      eventTags += '<span class="event-tag proj">推估</span>';
    }

    tr.innerHTML = `
      <td>${row.period}${eventTags}</td>
      <td>${row.payDate}</td>
      <td>${row.sellDate}</td>
      <td>${fmt(row.sellPrice, 2)}</td>
      <td>${fmt(row.sharesToSell)}</td>
      <td>${fmt(row.sellCost, 0)}</td>
      <td>${fmt(row.payment, 0)}</td>
      <td>${fmt(row.principal, 0)}</td>
      <td>${fmt(row.interest, 0)}</td>
      <td>${fmt(row.remainingLoan, 0)}</td>
      <td>${fmt(row.cash, 0)}</td>
      <td>${fmt(row.shares)}</td>
      <td>${fmt(row.payPrice, 2)}</td>
      <td>${fmt(row.marketValue, 0)}</td>
      <td style="color: ${row.netPosition >= 0 ? 'var(--green)' : 'var(--red)'}; font-weight:600">${fmt(row.netPosition, 0)}</td>
    `;
    tbody.appendChild(tr);
  }

  // 股利明細
  const divBody = document.getElementById('divBody');
  divBody.innerHTML = '';
  for (const d of sim.divResults) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="text-align:center">${d.exDate}</td>
      <td style="text-align:center">${d.payDate}</td>
      <td>${fmt(d.amount, 2)}</td>
      <td>${fmt(d.shares)}</td>
      <td>${fmt(d.total, 0)}</td>
      <td style="text-align:center">${d.action}</td>
      <td>${d.boughtShares > 0 ? fmt(d.boughtShares) : '-'}</td>
      <td>${d.buyPrice > 0 ? fmt(d.buyPrice, 2) : '-'}</td>
    `;
    divBody.appendChild(tr);
  }
}

// 執行
render();
</script>
